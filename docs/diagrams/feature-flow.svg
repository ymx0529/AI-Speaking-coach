<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#60A5FA"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0F172A; }
      .subtitle { font: 600 18px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #2563EB; letter-spacing: 2px; }
      .cardTitle { font: 700 22px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0F172A; }
      .cardText { font: 400 15px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .tag { font: 600 14px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #1D4ED8; }
      .num { font: 700 18px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: white; }
      .foot { font: 500 15px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #64748B; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="84" y="86" class="subtitle">SPEAKCOACH</text>
  <text x="84" y="132" class="title">功能流程图</text>
  <text x="84" y="168" class="foot">从首页进入，到语音对练、实时反馈，再到课后总结的完整使用闭环</text>

  <g filter="url(#shadow)">
    <rect x="84" y="230" width="318" height="132" rx="24" fill="url(#card)" stroke="#DCE7F7"/>
    <circle cx="132" cy="279" r="22" fill="url(#accent)"/>
    <text x="125" y="286" class="num">1</text>
    <text x="168" y="278" class="cardTitle">首页进入</text>
    <text x="168" y="308" class="cardText">
      <tspan x="168" dy="0">查看产品介绍，点击登录</tspan>
      <tspan x="168" dy="24">或开始体验</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="446" y="230" width="318" height="132" rx="24" fill="url(#card)" stroke="#DCE7F7"/>
    <circle cx="494" cy="279" r="22" fill="url(#accent)"/>
    <text x="487" y="286" class="num">2</text>
    <text x="530" y="278" class="cardTitle">账号登录</text>
    <text x="530" y="308" class="cardText">
      <tspan x="530" dy="0">注册或登录，恢复本地</tspan>
      <tspan x="530" dy="24">用户与会话状态</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="808" y="230" width="318" height="132" rx="24" fill="url(#card)" stroke="#DCE7F7"/>
    <circle cx="856" cy="279" r="22" fill="url(#accent)"/>
    <text x="849" y="286" class="num">3</text>
    <text x="892" y="278" class="cardTitle">选择练习方式</text>
    <text x="892" y="308" class="cardText">
      <tspan x="892" dy="0">固定场景或自定义场景，</tspan>
      <tspan x="892" dy="24">并选择难度等级</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1170" y="230" width="318" height="132" rx="24" fill="url(#card)" stroke="#DCE7F7"/>
    <circle cx="1218" cy="279" r="22" fill="url(#accent)"/>
    <text x="1211" y="286" class="num">4</text>
    <text x="1254" y="278" class="cardTitle">创建会话</text>
    <text x="1254" y="308" class="cardText">
      <tspan x="1254" dy="0">建立 WebSocket 连接，</tspan>
      <tspan x="1254" dy="24">初始化本轮对话</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="150" y="500" width="324" height="144" rx="24" fill="url(#card)" stroke="#DCE7F7"/>
    <circle cx="200" cy="554" r="22" fill="url(#accent)"/>
    <text x="193" y="561" class="num">5</text>
    <text x="238" y="551" class="cardTitle">开始说话</text>
    <text x="238" y="581" class="cardText">
      <tspan x="238" dy="0">浏览器采集麦克风音频，</tspan>
      <tspan x="238" dy="24">并上传语音数据</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="510" y="500" width="324" height="144" rx="24" fill="url(#card)" stroke="#DCE7F7"/>
    <circle cx="560" cy="554" r="22" fill="url(#accent)"/>
    <text x="553" y="561" class="num">6</text>
    <text x="598" y="551" class="cardTitle">语音识别</text>
    <text x="598" y="581" class="cardText">
      <tspan x="598" dy="0">后端转码并调用 ASR，</tspan>
      <tspan x="598" dy="24">得到英文识别文本</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="870" y="500" width="324" height="144" rx="24" fill="url(#card)" stroke="#DCE7F7"/>
    <circle cx="920" cy="554" r="22" fill="url(#accent)"/>
    <text x="913" y="561" class="num">7</text>
    <text x="958" y="551" class="cardTitle">AI 场景化回复</text>
    <text x="958" y="581" class="cardText">
      <tspan x="958" dy="0">按场景、难度和历史对话</tspan>
      <tspan x="958" dy="24">生成回复，并合成语音</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1230" y="500" width="258" height="144" rx="24" fill="url(#card)" stroke="#DCE7F7"/>
    <circle cx="1280" cy="554" r="22" fill="url(#accent)"/>
    <text x="1273" y="561" class="num">8</text>
    <text x="1320" y="551" class="cardTitle">实时分析</text>
    <text x="1320" y="581" class="cardText">
      <tspan x="1320" dy="0">发音评测、纠错分析</tspan>
      <tspan x="1320" dy="24">实时推送到侧栏</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="510" y="760" width="580" height="136" rx="24" fill="url(#card)" stroke="#DCE7F7"/>
    <circle cx="562" cy="812" r="22" fill="url(#accent)"/>
    <text x="555" y="819" class="num">9</text>
    <text x="604" y="810" class="cardTitle">结束对话并生成总结</text>
    <text x="604" y="840" class="cardText">
      <tspan x="604" dy="0">查看总体得分、重点词、问题分布、推荐表达</tspan>
      <tspan x="604" dy="24">以及逐轮回看结果</tspan>
    </text>
  </g>

  <path d="M402 296H446" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M764 296H808" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1126 296H1170" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1329 362V430H312V500" stroke="#60A5FA" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M474 572H510" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M834 572H870" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1194 572H1230" stroke="#60A5FA" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1359 644V712H800V760" stroke="#60A5FA" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="96" y="904" width="504" height="44" rx="22" fill="#E0F2FE"/>
  <text x="124" y="932" class="tag">固定场景：求职面试 / 餐厅点餐 / 商务会议 / 自定义场景</text>

  <rect x="922" y="904" width="578" height="44" rx="22" fill="#DCFCE7"/>
  <text x="948" y="932" class="tag">分析结果在会话侧栏实时展示，练习结束后汇总到总结页</text>
</svg>
